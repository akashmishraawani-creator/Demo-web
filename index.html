<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI SaaS Tool</title>

  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:#fff; text-align:center; }
    section { padding:50px 20px; }
    .btn { padding:12px 20px; background:#3b82f6; color:#fff; border:none; border-radius:6px; cursor:pointer; }
    input { padding:10px; border-radius:6px; border:none; margin:10px; }
    #msg { margin-top:10px; }
  </style>

</head>

<body>

<h1>🚀 AI Tool</h1>

<section>
  <h2>Enter Name</h2>
  <input type="text" id="nameInput" placeholder="Enter name">
  <br>
  <button class="btn" id="saveBtn">Save</button>
  <p id="msg"></p>
</section>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDyM2Ws5dzUsnZr1pRbshZ77mgB-RbrpIg",
    authDomain: "fir-saas-5dba9.firebaseapp.com",
    projectId: "fir-saas-5dba9",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const msg = document.getElementById("msg");

  document.getElementById("saveBtn").addEventListener("click", async () => {

    const name = document.getElementById("nameInput").value.trim();

    if (!name) {
      msg.innerText = "❌ Name likh pehle";
      return;
    }

    try {
      await addDoc(collection(db, "users"), {
        name: name
      });

      msg.innerText = "✅ Data save ho gaya 🔥";
      document.getElementById("nameInput").value = "";

    } catch (err) {
      msg.innerText = "❌ Error: " + err.message;
      console.log(err);
    }

  });

</script>

</body>
</html>
