<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FollowFlow \u2014 WhatsApp Auto Follow-up Automation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap');

/* ===== VARIABLES ===== */
:root {
  --cream:      #FFF8E7;
  --gold-light: #FFD77A;
  --gold-rich:  #E6A520;
  --gold-deep:  #C8891A;
  --brown:      #7A4A00;
  --brown-mid:  #5C3700;
  --white:      #FFFFFF;
  --t-dark:     #1E0F00;
  --t-mid:      #5A3A0A;
  --t-light:    #9B7040;
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px;
  --tr: 0.28s ease;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:#FFF8E7;color:#1E0F00;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#FFF8E7}
::-webkit-scrollbar-thumb{background:#FFD77A;border-radius:3px}

/* ===== TYPOGRAPHY ===== */
.display{font-family:'Playfair Display',Georgia,serif}

/* ===== LAYOUT ===== */
.wrap{max-width:1140px;margin:0 auto;padding:0 24px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:none;transition:all var(--tr);cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#FFD77A,#E6A520);color:#3A1F00;box-shadow:0 4px 20px rgba(230,165,32,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(230,165,32,.5)}
.btn-outline{background:transparent;color:#7A4A00;border:1.5px solid #E6A520}
.btn-outline:hover{background:rgba(255,215,122,.18);transform:translateY(-1px)}
.btn-white{background:#fff;color:#7A4A00;border:1.5px solid rgba(230,165,32,.3)}
.btn-white:hover{background:#FFF8E7;transform:translateY(-1px)}

/* ===== NAV ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,248,231,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(230,165,32,.18)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:66px;max-width:1140px;margin:0 auto;padding:0 24px}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:#7A4A00}
.brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#FFD77A,#E6A520);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.nav-links{display:flex;align-items:center;gap:30px}
.nav-links a{font-size:14px;font-weight:500;color:#5A3A0A;transition:color var(--tr)}
.nav-links a:hover{color:#7A4A00}
.nav-btns{display:flex;align-items:center;gap:10px}
.nav-btn-outline{padding:8px 18px;border-radius:var(--r-sm);border:1.5px solid #E6A520;background:transparent;font-size:13px;font-weight:600;color:#7A4A00;transition:all var(--tr)}
.nav-btn-outline:hover{background:rgba(255,215,122,.2)}
.nav-btn-fill{padding:8px 20px;border-radius:var(--r-sm);background:linear-gradient(135deg,#FFD77A,#E6A520);border:none;font-size:13px;font-weight:700;color:#3A1F00;box-shadow:0 2px 12px rgba(230,165,32,.3);transition:all var(--tr)}
.nav-btn-fill:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(230,165,32,.45)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none}
.hamburger span{width:22px;height:2px;background:#7A4A00;border-radius:2px;display:block;transition:all var(--tr)}

/* ===== HERO ===== */
.hero{min-height:100vh;padding:110px 0 80px;background:linear-gradient(145deg,#FFF8E7 0%,#FFF3CC 55%,#FFE99A 100%);position:relative;overflow:hidden;display:flex;align-items:center}
.hero::before{content:'';position:absolute;top:-180px;right:-180px;width:640px;height:640px;background:radial-gradient(circle,rgba(255,215,122,.45) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-160px;left:-120px;width:520px;height:520px;background:radial-gradient(circle,rgba(230,165,32,.15) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,122,.35);border:1px solid rgba(230,165,32,.45);padding:6px 15px;border-radius:50px;font-size:12px;font-weight:600;color:#5C3700;letter-spacing:.4px;margin-bottom:22px}
.badge-dot{width:7px;height:7px;background:#E6A520;border-radius:50%;animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hero-h1{font-family:'Playfair Display',Georgia,serif;font-size:clamp(36px,5vw,62px);font-weight:800;line-height:1.1;color:#1E0F00;margin-bottom:20px}
.hero-h1 em{font-style:normal;color:#E6A520}
.hero-p{font-size:16px;line-height:1.7;color:#5A3A0A;max-width:460px;margin-bottom:36px}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:44px}
.hero-trust{display:flex;align-items:center;gap:16px}
.avatars{display:flex}
.avatars span{width:34px;height:34px;border-radius:50%;border:2.5px solid #FFF8E7;background:linear-gradient(135deg,#FFD77A,#E6A520);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#5C3700;margin-left:-10px;flex-shrink:0}
.avatars span:first-child{margin-left:0}
.trust-txt{font-size:13px;color:#9B7040;line-height:1.4}
.trust-txt strong{color:#5A3A0A}

/* Hero Mockup */
.hero-right{position:relative}
.mockup-box{background:#fff;border-radius:22px;box-shadow:0 20px 70px rgba(122,74,0,.18),0 0 0 1px rgba(230,165,32,.12);padding:24px;position:relative;z-index:2}
.mock-topbar{display:flex;align-items:center;gap:10px;padding-bottom:16px;border-bottom:1px solid rgba(230,165,32,.14);margin-bottom:18px}
.mock-wa-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#25D366,#128C7E);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mock-lead-info h4{font-size:14px;font-weight:600;color:#1E0F00}
.mock-lead-info span{font-size:11px;color:#9B7040}
.online-dot{width:9px;height:9px;background:#25D366;border-radius:50%;margin-left:auto;box-shadow:0 0 6px #25D366}
.mock-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:12.5px;line-height:1.55}
.bubble-out{align-self:flex-end;background:linear-gradient(135deg,#dcf8c6,#c5eeaf);color:#1a3a1a;border-bottom-right-radius:4px}
.bubble-in{align-self:flex-start;background:#f4f4f4;color:#333;border-bottom-left-radius:4px}
.bubble-time{font-size:10px;color:#aaa;text-align:right;margin-top:3px}
.mock-auto-bar{background:linear-gradient(135deg,rgba(255,215,122,.22),rgba(230,165,32,.14));border:1px solid rgba(230,165,32,.32);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.auto-bar-info{flex:1}
.auto-bar-info p{font-size:12px;font-weight:600;color:#5C3700}
.auto-bar-info span{font-size:11px;color:#9B7040}
.live-badge{background:#E6A520;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
.float-stat{position:absolute;background:#fff;border-radius:14px;padding:11px 16px;box-shadow:0 8px 30px rgba(122,74,0,.15),0 0 0 1px rgba(230,165,32,.1);display:flex;align-items:center;gap:10px;z-index:3;animation:floatY 3.5s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.float-stat.s1{bottom:-18px;left:-28px;animation-delay:0s}
.float-stat.s2{top:-18px;right:-18px;animation-delay:1.7s}
.stat-ico{font-size:22px}
.stat-txt p{font-size:13px;font-weight:700;color:#1E0F00}
.stat-txt span{font-size:11px;color:#9B7040}

/* ===== LOGOS BAR ===== */
.logos-bar{padding:44px 0;border-top:1px solid rgba(230,165,32,.12);border-bottom:1px solid rgba(230,165,32,.12);background:#FFFBF0}
.logos-label{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9B7040;font-weight:500;margin-bottom:24px}
.logos-row{display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap}
.logo-chip{padding:7px 18px;border-radius:40px;border:1px solid rgba(230,165,32,.22);background:rgba(255,215,122,.1);font-size:13px;font-weight:600;color:#9B7040}

/* ===== SECTION COMMON ===== */
section{padding:88px 0}
.sec-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#E6A520;margin-bottom:12px}
.sec-label::before{content:'';width:18px;height:2px;background:#E6A520;border-radius:2px}
.sec-title{font-family:'Playfair Display',Georgia,serif;font-size:clamp(28px,4vw,46px);font-weight:700;color:#1E0F00;line-height:1.18;margin-bottom:14px}
.sec-title em{font-style:normal;color:#E6A520}
.sec-desc{font-size:15px;color:#5A3A0A;line-height:1.7;max-width:520px;margin:0 auto}
.sec-head{text-align:center;margin-bottom:60px}

/* ===== FEATURES ===== */
.features-bg{background:#FFF8E7}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.feat-card{background:#fff;border:1.5px solid rgba(230,165,32,.22);border-radius:var(--r-lg);padding:32px 28px;box-shadow:0 6px 32px rgba(122,74,0,.07);transition:all var(--tr);position:relative;overflow:hidden}
.feat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,215,122,.07),transparent 60%);opacity:0;transition:opacity var(--tr)}
.feat-card:hover{transform:translateY(-7px);box-shadow:0 18px 54px rgba(122,74,0,.12),0 0 0 2px rgba(230,165,32,.28)}
.feat-card:hover::after{opacity:1}
.feat-icon{width:52px;height:52px;border-radius:15px;background:linear-gradient(135deg,rgba(255,215,122,.4),rgba(230,165,32,.18));border:1px solid rgba(230,165,32,.28);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:22px}
.feat-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#1E0F00;margin-bottom:10px}
.feat-desc{font-size:13.5px;color:#5A3A0A;line-height:1.65}
.feat-tag{display:inline-block;margin-top:16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#E6A520;background:rgba(230,165,32,.1);padding:4px 11px;border-radius:20px}

/* ===== HOW IT WORKS ===== */
.how-bg{background:linear-gradient(180deg,#FFF3CC,#FFF8E7)}
.steps-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative}
.steps-row::before{content:'';position:absolute;top:39px;left:calc(100%/6);right:calc(100%/6);height:2px;background:linear-gradient(90deg,#FFD77A,#E6A520,#FFD77A);z-index:0}
.step{text-align:center;padding:0 28px;position:relative;z-index:1}
.step-num{width:78px;height:78px;border-radius:50%;margin:0 auto 26px;background:linear-gradient(135deg,#FFD77A,#E6A520);border:4px solid #FFF8E7;box-shadow:0 0 0 2.5px #E6A520,0 8px 28px rgba(230,165,32,.3);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#5C3700}
.step-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1E0F00;margin-bottom:10px}
.step-desc{font-size:13.5px;color:#5A3A0A;line-height:1.65}

/* ===== PRICING ===== */
.pricing-bg{background:#FFF8E7}
.pricing-row{display:grid;grid-template-columns:1fr 1fr;gap:26px;max-width:700px;margin:0 auto}
.price-card{background:#fff;border:1.5px solid rgba(230,165,32,.22);border-radius:var(--r-xl);padding:38px 34px;box-shadow:0 6px 32px rgba(122,74,0,.07);transition:all var(--tr);position:relative}
.price-card:hover{transform:translateY(-5px);box-shadow:0 18px 54px rgba(122,74,0,.12)}
.price-card.hot{border-color:#E6A520;border-width:2px;box-shadow:0 8px 44px rgba(230,165,32,.22),0 0 0 1px #E6A520;transform:scale(1.03)}
