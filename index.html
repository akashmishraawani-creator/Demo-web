<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FollowFlow \u2014 WhatsApp Automation SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8E7;
    --gold-soft: #FFD77A;
    --gold-rich: #E6A520;
    --brown-deep: #7A4A00;
    --brown-mid: #9B6A1A;
    --brown-light: #C8882A;
    --white: #FFFFFF;
    --text-dark: #2C1A00;
    --text-mid: #5C3A0A;
    --text-light: #9B7840;
    --shadow-gold: 0 8px 32px rgba(230,165,32,0.18);
    --shadow-soft: 0 4px 24px rgba(122,74,0,0.10);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --transition: 0.3s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  /* \u2500\u2500\u2500 NAV \u2500\u2500\u2500 */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%;
    height: 72px;
    background: rgba(255,248,231,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(230,165,32,0.18);
    transition: box-shadow var(--transition);
  }
  nav.scrolled { box-shadow: var(--shadow-soft); }

  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem; font-weight: 700;
    color: var(--brown-deep); text-decoration: none;
  }
  .nav-logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold-rich));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    box-shadow: 0 2px 12px rgba(230,165,32,0.35);
  }

  .nav-links {
    display: flex; align-items: center; gap: 32px;
    list-style: none;
  }
  .nav-links a {
    text-decoration: none; color: var(--text-mid);
    font-size: 0.92rem; font-weight: 500;
    transition: color var(--transition);
  }
  .nav-links a:hover { color: var(--gold-rich); }

  .nav-cta {
    display: flex; align-items: center; gap: 12px;
  }
  .btn-outline {
    padding: 9px 20px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--gold-rich); background: transparent;
    color: var(--brown-deep); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: all var(--transition);
  }
  .btn-outline:hover { background: var(--gold-rich); color: var(--white); }

  .btn-primary {
    padding: 10px 22px; border-radius: var(--radius-sm);
    border: none; background: linear-gradient(135deg, var(--gold-rich), #C87A00);
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 3px 14px rgba(230,165,32,0.38);
    transition: all var(--transition);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 22px rgba(230,165,32,0.52);
    background: linear-gradient(135deg, #F0A820, #D4890A);
  }

  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--brown-deep); border-radius: 2px; transition: all var(--transition); }

  /* \u2500\u2500\u2500 HERO \u2500\u2500\u2500 */
  #landing { display: block; }
  #dashboard { display: none; }

  .hero {
    min-height: 100vh;
    padding: 120px 5% 80px;
    background: linear-gradient(155deg, var(--cream) 0%, #FFF3D0 40%, rgba(255,215,122,0.35) 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  .hero-bg-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
  }
  .hbc1 { width: 500px; height: 500px; background: rgba(255,215,122,0.22); top: -100px; right: -120px; }
  .hbc2 { width: 320px; height: 320px; background: rgba(230,165,32,0.12); bottom: 40px; left: -80px; }
  .hbc3 { width: 180px; height: 180px; background: rgba(122,74,0,0.06); top: 200px; left: 35%; }

  .hero-inner {
    max-width: 1100px; width: 100%; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 100px;
    background: rgba(255,215,122,0.35); border: 1px solid rgba(230,165,32,0.4);
    font-size: 0.82rem; font-weight: 600; color: var(--brown-mid);
    margin-bottom: 24px; width: fit-content;
    animation: fadeInUp 0.6s ease both;
  }
  .hero-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-rich); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }

  .hero-headline {
    font-size: clamp(2.2rem, 4.5vw, 3.4rem);
    font-weight: 700; line-height: 1.18;
    color: var(--text-dark); margin-bottom: 20px;
    animation: fadeInUp 0.7s 0.1s ease both;
  }
  .hero-headline span { color: var(--gold-rich); position: relative; }
  .hero-headline span::after {
    content: ''; position: absolute; bottom: 2px; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold-rich));
    border-radius: 2px;
  }

  .hero-sub {
    font-size: 1.08rem; line-height: 1.7; color: var(--text-mid);
    margin-bottom: 36px; max-width: 480px;
    animation: fadeInUp 0.7s 0.2s ease both;
  }

  .hero-btns {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    animation: fadeInUp 0.7s 0.3s ease both;
  }
  .hero-btn-main {
    padding: 14px 30px; border-radius: var(--radius-md);
    border: none; background: linear-gradient(135deg, var(--gold-rich), #C87A00);
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 6px 24px rgba(230,165,32,0.42);
    transition: all var(--transition); text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .hero-btn-main:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(230,165,32,0.55);
  }
  .hero-btn-sec {
    padding: 13px 28px; border-radius: var(--radius-md);
    border: 1.5px solid var(--gold-rich); background: transparent;
    color: var(--brown-deep); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: all var(--transition); text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .hero-btn-sec:hover { background: rgba(255,215,122,0.25); transform: translateY(-2px); }

  .hero-trust {
    margin-top: 36px; display: flex; align-items: center; gap: 12px;
    animation: fadeInUp 0.7s 0.4s ease both;
  }
  .hero-trust-avatars { display: flex; }
  .hero-trust-avatars span {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2.5px solid var(--cream);
    background: linear-gradient(135deg, var(--gold-soft), var(--brown-mid));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 700; color: var(--white);
    margin-left: -10px;
  }
  .hero-trust-avatars span:first-child { margin-left: 0; }
  .hero-trust-text { font-size: 0.85rem; color: var(--text-mid); }
  .hero-trust-text strong { color: var(--gold-rich); }

  /* Hero visual */
  .hero-visual {
    position: relative;
    animation: fadeInRight 0.8s 0.2s ease both;
  }

  @keyframes fadeInRight { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .hero-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: 0 16px 64px rgba(122,74,0,0.13), 0 0 0 1px rgba(230,165,32,0.15);
  }

  .hero-card-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding-bottom: 16px; border-bottom: 1px solid rgba(230,165,32,0.18);
  }
  .hero-card-icon {
    width: 42px; height: 42px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--gold-soft), var(--gold-rich));
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
  }
  .hero-card-title { font-size: 0.9rem; font-weight: 700; color: var(--text-dark); }
  .hero-card-sub { font-size: 0.78rem; color: var(--text-light); }

  .hero-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .hero-stat {
    padding: 16px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, rgba(255,215,122,0.18), rgba(230,165,32,0.08));
    border: 1px solid rgba(230,165,32,0.2);
  }
  .hero-stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--brown-deep); }
  .hero-stat-label { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }

  .hero-leads { display: flex; flex-direction: column; gap: 10px; }
  .hero-lead-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: rgba(255,248,231,0.8); border: 1px solid rgba(230,165,32,0.14);
  }
  .hero-lead-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-soft), var(--brown-mid));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; color: var(--white); flex-shrink: 0;
  }
  .hero-lead-name { font-size: 0.83rem; font-weight: 600; color: var(--text-dark); }
  .hero-lead-phone { font-size: 0.74rem; color: var(--text-light); }
  .hero-lead-badge {
    margin-left: auto; padding: 3px 10px; border-radius: 100px;
    font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  }
  .badge-sent { background: rgba(255,215,122,0.35); color: var(--brown-mid); }
  .badge-follow { background: rgba(230,165,32,0.22); color: var(--brown-deep); border: 1px solid rgba(230,165,32,0.4); }

  /* Floating elements */
  .hero-float {
    position: absolute;
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    box-shadow: var(--shadow-gold);
    border: 1px solid rgba(230,165,32,0.25);
    animation: float 4s ease-in-out infinite;
    z-index: 10;
  }
  .hero-float-1 { top: -20px; right: -30px; animation-delay: 0s; }
  .hero-float-2 { bottom: 30px; left: -40px; animation-delay: 2s; }
  .float-content { display: flex; align-items: center; gap: 8px; }
  .float-icon { font-size: 1.1rem; }
  .float-text { font-size: 0.78rem; font-weight: 600; color: var(--text-dark); }
  .float-sub { font-size: 0.68rem; color: var(--text-light); }

  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
  }

  /* \u2500\u2500\u2500 SECTION SHARED \u2500\u2500\u2500 */
  section { padding: 96px 5%; }
  .section-label {
    display: inline-block; padding: 5px 16px; border-radius: 100px;
    background: rgba(255,215,122,0.3); border: 1px solid rgba(230,165,32,0.35);
    font-size: 0.78rem; font-weight: 700; color: var(--brown-mid);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 700; line-height: 1.25; color: var(--text-dark);
    margin-bottom: 14px;
  }
  .section-title span { color: var(--gold-rich); }
  .section-sub {
    font-size: 1.02rem; color: var(--text-mid); line-height: 1.7;
    max-width: 540px;
  }
  .section-header { margin-bottom: 56px; }
  .text-center { text-align: center; }
  .text-center .section-sub { margin: 0 auto; }

  /* \u2500\u2500\u2500 FEATURES \u2500\u2500\u2500 */
  .features { background: var(--white); }
  .features-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    max-width: 1100px; margin: 0 auto;
  }

  .feature-card {
    padding: 32px 24px;
    border-radius: var(--radius-md);
    background: var(--cream);
    border: 1.5px solid rgba(230,165,32,0.25);
    box-shadow: 0 4px 20px rgba(122,74,0,0.07);
    transition: all var(--transition);
    position: relative; overflow: hidden;
  }
  .feature-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,215,122,0.15) 0%, transparent 60%);
    opacity: 0; transition: opacity var(--transition);
  }
  .feature-card:hover {
    transform: translateY(-8px);
    border-color: var(--gold-rich);
    box-shadow: 0 16px 48px rgba(230,165,32,0.22), 0 0 0 1px rgba(230,165,32,0.35);
  }
  .feature-card:hover::before { opacity: 1; }

  .feature-icon {
    width: 54px; height: 54px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--gold-soft), var(--gold-rich));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(230,165,32,0.35);
    transition: transform var(--transition);
  }
  .feature-card:hover .feature-icon { transform: scale(1.1) rotate(-4deg); }
  .feature-title { font-size: 1.08rem; font-weight: 700; color: var(--text-dark); margin-bottom: 10px; }
  .feature-desc { font-size: 0.88rem; color: var(--text-mid); line-height: 1.65; }

  /* \u2500\u2500\u2500 HOW IT WORKS \u2500\u2500\u2500 */
  .hiw { background: linear-gradient(160deg, var(--cream) 0%, rgba(255,215,122,0.18) 100%); }
  .hiw-steps {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    max-width: 900px; margin: 0 auto;
    position: relative;
  }
  .hiw-steps::before {
    content: ''; position: absolute;
    top: 46px; left: 15%; right: 15%;
    height: 2px;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold-rich), var(--gold-soft));
    z-index: 0;
  }
  .hiw-step { text-align: center; padding: 0 20px; position: relative; z-index: 1; }
  .hiw-num {
    width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold-rich));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--white);
    box-shadow: 0 6px 24px rgba(230,165,32,0.42);
    border: 3px solid var(--white);
  }
  .hiw-step-title { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
  .hiw-step-desc { font-size: 0.86rem; color: var(--text-mid); line-height: 1.65; }
  .hiw-step-icon { font-size: 1.8rem; margin-bottom: 14px; }

  /* \u2500\u2500\u2500 PRICING \u2500\u2500\u2500 */
  .pricing { background: var(--white); }
  .pricing-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
    max-width: 760px; margin: 0 auto;
  }

  .pricing-card {
    padding: 40px 36px; border-radius: var(--radius-lg);
    border: 1.5px solid rgba(230,165,32,0.22);
    background: var(--cream); position: relative;
    transition: all var(--transition);
  }
  .pricing-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-gold); }

  .pricing-card.featured {
    background: var(--white);
    border: 2px solid var(--gold-soft);
    box-shadow: 0 0 0 4px rgba(255,215,122,0.2), var(--shadow-gold);
  }
  .pricing-card.featured:hover { box-shadow: 0 0 0 6px rgba(255,215,122,0.28), 0 16px 48px rgba(230,165,32,0.3); }

  .pricing-badge {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    padding: 4px 18px; border-radius: 100px;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold-rich));
    color: var(--white); font-size: 0.76rem; font-weight: 700;
    white-space: nowrap; box-shadow: 0 3px 10px rgba(230,165,32,0.4);
  }

  .pricing-plan { font-size: 0.82rem; font-weight: 700; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .pricing-price {
    display: flex; align-items: flex-end; gap: 4px; margin-bottom: 6px;
  }
  .pricing-dollar { font-size: 1.4rem; font-weight: 700; color: var(--brown-deep); line-height: 1; margin-bottom: 8px; }
  .pricing-num { font-family: 'Playfair Display', serif; font-size: 3.2rem; font-weight: 700; color: var(--text-dark); line-height: 1; }
  .pricing-period { font-size: 0.9rem; color: var(--text-light); margin-bottom: 10px; }
  .pricing-desc { font-size: 0.86rem; color: var(--text-mid); margin-bottom: 28px; }

  .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .pricing-features li {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.88rem; color: var(--text-mid);
  }
  .pricing-features li::before {
    content: '\u2713'; width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--gold-soft), var(--gold-rich));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 800; color: var(--white);
  }

  .pricing-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: all var(--transition); border: none;
  }
  .pricing-btn-outline {
    background: transparent; border: 1.5px solid var(--gold-rich); color: var(--brown-deep);
  }
  .pricing-btn-outline:hover { background: rgba(255,215,122,0.25); }
  .pricing-btn-fill {
    background: linear-gradient(135deg, var(--gold-rich), #C87A00); color: var(--white);
    box-shadow: 0 4px 18px rgba(230,165,32,0.42);
  }
  .pricing-btn-fill:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(230,165,32,0.55); }

  /* \u2500\u2500\u2500 TESTIMONIALS \u2500\u2500\u2500 */
  .testimonials { background: linear-gradient(160deg, var(--cream) 0%, rgba(255,215,122,0.15) 100%); }
  .testimonials-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    max-width: 1100px; margin: 0 auto;
  }
  .testi-card {
    padding: 30px 26px; border-radius: var(--radius-md);
    background: var(--white); border: 1px solid rgba(230,165,32,0.18);
    box-shadow: var(--shadow-soft);
    transition: all var(--transition);
  }
  .testi-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-gold); border-color: rgba(230,165,32,0.35); }
  .testi-stars { color: var(--gold-rich); font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 14px; }
  .testi-text { font-size: 0.9rem; line-height: 1.7; color: var(--text-mid); margin-bottom: 20px; font-style: italic; }
  .testi-author { display: flex; align-items: center; gap: 12px; }
  .testi-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-soft), var(--brown-mid));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: var(--white);
  }
  .testi-name { font-size: 0.88rem; font-weight: 700; color: var(--text-dark); }
  .testi-role { font-size: 0.76rem; color: var(--text-light); }

  /* \u2500\u2500\u2500 FOOTER \u2500\u2500\u2500 */
  footer {
    background: var(--brown-deep); padding: 64px 5% 32px;
    color: rgba(255,248,231,0.75);
  }
  .footer-top {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 48px; border-bottom: 1px solid rgba(255,215,122,0.15);
    margin-bottom: 32px;
  }
  .footer-brand-name {
    font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700;
    color: var(--gold-soft); margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
  }
  .footer-brand-de
