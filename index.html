<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FollowFlow \u2014 WhatsApp Auto Follow-up SaaS</title>
<style>
/* \u2500\u2500 SYSTEM FONTS (no external load needed) \u2500\u2500 */
@import url('data:text/css,');

:root {
  --cream: #FFF8E7;
  --cream2: #FFF3D0;
  --gold: #FFD77A;
  --gold-rich: #E6A520;
  --gold-dark: #C87A00;
  --brown: #7A4A00;
  --brown2: #9B6A1A;
  --brown3: #5C3A0A;
  --white: #FFFFFF;
  --r10: 10px;
  --r16: 16px;
  --r24: 24px;
  --t: 0.28s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--cream);
  color: var(--brown3);
  line-height: 1.6;
  overflow-x: hidden;
}

h1,h2,h3,h4 {
  font-family: Georgia, 'Times New Roman', serif;
  color: var(--brown);
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 NAV \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
nav {
  position: fixed; top:0; left:0; right:0; z-index:999;
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 6%; height:68px;
  background: rgba(255,248,231,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1.5px solid rgba(230,165,32,0.2);
  box-shadow: 0 2px 20px rgba(122,74,0,0.08);
  transition: box-shadow var(--t);
}

.logo {
  display:flex; align-items:center; gap:10px;
  text-decoration:none; font-family:Georgia,serif;
  font-size:1.3rem; font-weight:700; color:var(--brown);
  cursor:pointer;
}
.logo-icon {
  width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem;
  box-shadow:0 3px 12px rgba(230,165,32,0.4);
}

.nav-links {
  display:flex; align-items:center; gap:28px; list-style:none;
}
.nav-links a {
  text-decoration:none; color:var(--brown2);
  font-size:0.93rem; font-weight:500;
  transition:color var(--t);
}
.nav-links a:hover { color:var(--gold-rich); }

.nav-btns { display:flex; gap:10px; }

.btn {
  padding:10px 22px; border-radius:var(--r10);
  font-family:inherit; font-size:0.9rem; font-weight:600;
  cursor:pointer; transition:all var(--t); border:none;
  text-decoration:none; display:inline-flex; align-items:center; gap:6px;
}
.btn-outline {
  background:transparent; border:1.5px solid var(--gold-rich);
  color:var(--brown);
}
.btn-outline:hover { background:var(--gold); }
.btn-gold {
  background:linear-gradient(135deg,var(--gold-rich),var(--gold-dark));
  color:#fff;
  box-shadow:0 4px 16px rgba(230,165,32,0.4);
}
.btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(230,165,32,0.55); }

/* hamburger */
.ham { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; }
.ham span { display:block; width:24px; height:2.5px; background:var(--brown); border-radius:3px; transition:all var(--t); }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 PAGES \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
#page-landing { display:block; }
#page-dash    { display:none; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HERO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.hero {
  padding: 110px 6% 80px;
  min-height:100vh;
  background: linear-gradient(150deg, var(--cream) 0%, var(--cream2) 50%, rgba(255,215,122,0.3) 100%);
  display:flex; align-items:center;
  position:relative; overflow:hidden;
}

/* decorative circles */
.hero::before {
  content:'';
  position:absolute; top:-120px; right:-120px;
  width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle, rgba(255,215,122,0.25) 0%, transparent 70%);
  pointer-events:none;
}
.hero::after {
  content:'';
  position:absolute; bottom:-80px; left:-80px;
  width:360px; height:360px; border-radius:50%;
  background:radial-gradient(circle, rgba(230,165,32,0.15) 0%, transparent 70%);
  pointer-events:none;
}

.hero-wrap {
  max-width:1180px; width:100%; margin:0 auto;
  display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center;
}

/* left */
.hero-badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 16px; border-radius:100px;
  background:rgba(255,215,122,0.35); border:1px solid rgba(230,165,32,0.45);
  font-size:0.8rem; font-weight:700; color:var(--brown2);
  margin-bottom:22px;
}
.pulse-dot {
  width:8px; height:8px; border-radius:50%; background:var(--gold-rich);
  animation:pulse 1.8s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

.hero h1 {
  font-size:clamp(2rem,4vw,3.2rem);
  line-height:1.18; margin-bottom:18px; color:var(--brown);
}
.hero h1 em {
  font-style:normal; color:var(--gold-rich);
  border-bottom:3px solid var(--gold);
}
.hero p {
  font-size:1.05rem; color:var(--brown2); margin-bottom:32px;
  max-width:440px; line-height:1.75;
}

.hero-btns { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:36px; }
.hero-btns .btn { padding:14px 28px; font-size:1rem; border-radius:var(--r16); }

.trust {
  display:flex; align-items:center; gap:12px;
  font-size:0.84rem; color:var(--brown2);
}
.trust-avs { display:flex; }
.trust-avs span {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--brown2));
  border:2.5px solid var(--cream);
  display:flex; align-items:center; justify-content:center;
  font-size:0.68rem; font-weight:800; color:#fff;
  margin-left:-9px;
}
.trust-avs span:first-child { margin-left:0; }
.trust strong { color:var(--gold-rich); }

/* right \u2014 mockup card */
.hero-mockup {
  background:#fff; border-radius:var(--r24);
  padding:26px;
  box-shadow:0 20px 64px rgba(122,74,0,0.14), 0 0 0 1px rgba(230,165,32,0.18);
  position:relative;
}

.float-card {
  position:absolute;
  background:#fff; border-radius:12px;
  padding:10px 14px;
  box-shadow:0 6px 24px rgba(230,165,32,0.22);
  border:1px solid rgba(230,165,32,0.25);
  display:flex; align-items:center; gap:10px;
  font-size:0.78rem;
  animation:floatY 3.5s ease-in-out infinite;
}
.float-card.fc1 { top:-18px; right:-24px; animation-delay:0s; }
.float-card.fc2 { bottom:20px; left:-28px; animation-delay:1.8s; }
@keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.float-card .fi { font-size:1.1rem; }
.float-card .ft { font-weight:700; color:var(--brown); line-height:1.2; }
.float-card .fs { color:var(--brown2); font-size:0.7rem; }

.mock-head {
  display:flex; align-items:center; gap:12px;
  padding-bottom:16px; margin-bottom:18px;
  border-bottom:1px solid rgba(230,165,32,0.18);
}
.mock-icon {
  width:40px; height:40px; border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  display:flex; align-items:center; justify-content:center; font-size:1.15rem;
  box-shadow:0 3px 10px rgba(230,165,32,0.38);
}
.mock-head-text strong { display:block; font-size:0.88rem; color:var(--brown); }
.mock-head-text span { font-size:0.74rem; color:var(--brown2); }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
.stat-mini {
  padding:14px; border-radius:var(--r10);
  background:linear-gradient(135deg,rgba(255,215,122,0.2),rgba(230,165,32,0.08));
  border:1px solid rgba(230,165,32,0.2);
}
.stat-mini .n {
  font-family:Georgia,serif; font-size:1.55rem; font-weight:700;
  color:var(--brown); line-height:1;
}
.stat-mini .l { font-size:0.72rem; color:var(--brown2); margin-top:3px; }

.lead-list { display:flex; flex-direction:column; gap:9px; }
.lead-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--r10);
  background:rgba(255,248,231,0.8); border:1px solid rgba(230,165,32,0.14);
}
.lead-av {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--brown2));
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:800; color:#fff;
}
.lead-info strong { display:block; font-size:0.8rem; color:var(--brown); }
.lead-info span { font-size:0.7rem; color:var(--brown2); }
.badge {
  margin-left:auto; padding:3px 10px; border-radius:100px;
  font-size:0.68rem; font-weight:700; white-space:nowrap;
}
.b-sent { background:rgba(255,215,122,0.35); color:var(--brown2); }
.b-follow { background:rgba(230,165,32,0.22); color:var(--brown); border:1px solid rgba(230,165,32,0.4); }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 SECTION SHARED \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
section { padding:88px 6%; }
.max { max-width:1140px; margin:0 auto; }

.tag {
  display:inline-block; padding:5px 15px; border-radius:100px;
  background:rgba(255,215,122,0.3); border:1px solid rgba(230,165,32,0.38);
  font-size:0.76rem; font-weight:700; color:var(--brown2);
  letter-spacing:0.07em; text-transform:uppercase; margin-bottom:14px;
}
.sec-h { font-size:clamp(1.7rem,3.2vw,2.5rem); margin-bottom:12px; }
.sec-h em { font-style:normal; color:var(--gold-rich); }
.sec-p { font-size:0.98rem; color:var(--brown2); line-height:1.75; max-width:520px; }
.sec-hdr { margin-bottom:52px; }
.c { text-align:center; }
.c .sec-p { margin:0 auto; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 FEATURES \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.features { background:#fff; }

.feat-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:22px;
}

.feat-card {
  padding:30px 22px; border-radius:var(--r16);
  background:var(--cream); border:1.5px solid rgba(230,165,32,0.22);
  box-shadow:0 4px 18px rgba(122,74,0,0.07);
  transition:all var(--t); position:relative; overflow:hidden;
  cursor:default;
}
.feat-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,215,122,0.18),transparent);
  opacity:0; transition:opacity var(--t);
}
.feat-card:hover {
  transform:translateY(-8px);
  border-color:var(--gold-rich);
  box-shadow:0 16px 48px rgba(230,165,32,0.22);
}
.feat-card:hover::after { opacity:1; }

.feat-icon {
  width:52px; height:52px; border-radius:var(--r10);
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  display:flex; align-items:center; justify-content:center;
  font-size:1.45rem; margin-bottom:18px;
  box-shadow:0 4px 14px rgba(230,165,32,0.38);
  transition:transform var(--t);
}
.feat-card:hover .feat-icon { transform:scale(1.12) rotate(-4deg); }
.feat-card h3 { font-size:1rem; margin-bottom:9px; color:var(--brown); }
.feat-card p { font-size:0.86rem; color:var(--brown2); line-height:1.65; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HOW IT WORKS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.hiw { background:linear-gradient(155deg,var(--cream) 0%,rgba(255,215,122,0.18) 100%); }

.steps {
  display:grid; grid-template-columns:repeat(3,1fr); gap:0;
  max-width:860px; margin:0 auto; position:relative;
}
.steps::before {
  content:''; position:absolute; top:44px; left:16.5%; right:16.5%;
  height:2px; background:linear-gradient(90deg,var(--gold),var(--gold-rich),var(--gold));
}
.step { text-align:center; padding:0 18px; }
.step-emoji { font-size:1.8rem; margin-bottom:12px; }
.step-num {
  width:58px; height:58px; border-radius:50%; margin:0 auto 18px;
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  display:flex; align-items:center; justify-content:center;
  font-family:Georgia,serif; font-size:1.4rem; font-weight:700; color:#fff;
  box-shadow:0 6px 22px rgba(230,165,32,0.45);
  border:3px solid #fff; position:relative; z-index:1;
}
.step h3 { font-size:1.05rem; margin-bottom:8px; color:var(--brown); }
.step p { font-size:0.85rem; color:var(--brown2); line-height:1.65; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 PRICING \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.pricing { background:#fff; }

.price-wrap {
  display:grid; grid-template-columns:1fr 1fr; gap:26px;
  max-width:740px; margin:0 auto;
}

.price-card {
  padding:38px 34px; border-radius:var(--r24);
  border:1.5px solid rgba(230,165,32,0.22);
  background:var(--cream); position:relative;
  transition:all var(--t);
}
.price-card:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(230,165,32,0.2); }
.price-card.hot {
  background:#fff;
  border:2px solid var(--gold);
  box-shadow:0 0 0 4px rgba(255,215,122,0.2), 0 12px 40px rgba(230,165,32,0.2);
}
.price-card.hot:hover { box-shadow:0 0 0 6px rgba(255,215,122,0.28), 0 20px 56px rgba(230,165,32,0.3); }

.price-hot-tag {
  position:absolute; top:-14px; left:50%; transform:translateX(-50%);
  padding:4px 18px; border-radius:100px;
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  color:#fff; font-size:0.74rem; font-weight:700;
  white-space:nowrap; box-shadow:0 3px 10px rgba(230,165,32,0.4);
}

.price-plan { font-size:0.78rem; font-weight:700; color:var(--brown2); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
.price-num-wrap { display:flex; align-items:flex-end; gap:3px; margin-bottom:4px; }
.price-dollar { font-size:1.3rem; font-weight:700; color:var(--brown); line-height:1; margin-bottom:6px; }
.price-num { font-family:Georgia,serif; font-size:3rem; font-weight:700; color:var(--brown); line-height:1; }
.price-period { font-size:0.87rem; color:var(--brown2); margin-bottom:6px; }
.price-desc { font-size:0.84rem; color:var(--brown2); margin-bottom:26px; }

.price-list { list-style:none; display:flex; flex-direction:column; gap:11px; margin-bottom:30px; }
.price-list li { display:flex; align-items:center; gap:10px; font-size:0.86rem; color:var(--brown2); }
.price-list li::before {
  content:'\u2713'; flex-shrink:0;
  width:20px; height:20px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  display:flex; align-items:center; justify-content:center;
  font-size:0.68rem; font-weight:900; color:#fff;
}

.price-btn {
  width:100%; padding:13px; border-radius:var(--r10);
  font-family:inherit; font-size:0.93rem; font-weight:700;
  cursor:pointer; transition:all var(--t); border:none;
}
.price-btn-o { background:transparent; border:1.5px solid var(--gold-rich); color:var(--brown); }
.price-btn-o:hover { background:rgba(255,215,122,0.3); }
.price-btn-g {
  background:linear-gradient(135deg,var(--gold-rich),var(--gold-dark));
  color:#fff; box-shadow:0 4px 16px rgba(230,165,32,0.42);
}
.price-btn-g:hover { transform:translateY(-2px); box-shadow:0 8px 26px rgba(230,165,32,0.55); }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 TESTIMONIALS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.testi { background:linear-gradient(155deg,var(--cream) 0%,rgba(255,215,122,0.15) 100%); }

.testi-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:22px;
}

.testi-card {
  padding:28px 24px; border-radius:var(--r16);
  background:#fff; border:1px solid rgba(230,165,32,0.18);
  box-shadow:0 4px 20px rgba(122,74,0,0.07);
  transition:all var(--t);
}
.testi-card:hover { transform:translateY(-6px); box-shadow:0 14px 44px rgba(230,165,32,0.2); border-color:rgba(230,165,32,0.35); }
.stars { color:var(--gold-rich); font-size:0.9rem; letter-spacing:2px; margin-bottom:14px; }
.testi-card blockquote { font-size:0.88rem; line-height:1.72; color:var(--brown2); font-style:italic; margin-bottom:20px; }
.testi-author { display:flex; align-items:center; gap:12px; }
.tav {
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--brown2));
  display:flex; align-items:center; justify-content:center;
  font-size:0.78rem; font-weight:800; color:#fff; flex-shrink:0;
}
.tname { font-size:0.86rem; font-weight:700; color:var(--brown); }
.trole { font-size:0.73rem; color:var(--brown2); }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 FOOTER \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
footer {
  background:var(--brown); padding:60px 6% 30px;
  color:rgba(255,248,231,0.72);
}
.foot-top {
  display:grid; grid-template-columns:1.5fr 1fr 1fr 1fr; gap:44px;
  padding-bottom:44px; border-bottom:1px solid rgba(255,215,122,0.14);
  margin-bottom:28px;
}
.foot-brand { font-family:Georgia,serif; font-size:1.2rem; font-weight:700; color:var(--gold); display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.foot-desc { font-size:0.84rem; line-height:1.7; margin-bottom:18px; }
.foot-socials { display:flex; gap:8px; }
.soc {
  width:34px; height:34px; border-radius:8px;
  background:rgba(255,215,122,0.1); border:1px solid rgba(255,215,122,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:0.82rem; color:var(--gold); cursor:pointer;
  transition:all var(--t); text-decoration:none;
}
.soc:hover { background:rgba(255,215,122,0.22); transform:translateY(-2px); }
.foot-col h4 { font-family:inherit; font-size:0.76rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
.foot-col ul { list-style:none; display:flex; flex-direction:column; gap:9px; }
.foot-col a { font-size:0.84rem; color:rgba(255,248,231,0.6); text-decoration:none; transition:color var(--t); }
.foot-col a:hover { color:var(--gold); }
.foot-bot { display:flex; align-items:center; justify-content:space-between; font-size:0.79rem; }

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 DASHBOARD \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.dash-layout { display:flex; min-height:100vh; }

.sidebar {
  width:230px; min-height:100vh; background:var(--brown);
  position:fixed; top:0; left:0; z-index:200;
  display:flex; flex-direction:column; padding:0;
}
.sb-logo {
  display:flex; align-items:center; gap:10px;
  padding:22px 22px 20px;
  border-bottom:1px solid rgba(255,215,122,0.12);
  margin-bottom:12px;
  font-family:Georgia,serif; font-size:1.1rem; font-weight:700; color:var(--gold);
  cursor:pointer; text-decoration:none;
}
.sb-logo-icon {
  width:32px; height:32px; border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-rich));
  display:flex; align-items:center; justify-content:center; font-size:0.95rem;
}
.sb-nav { flex:1; padding:0 10px; display:flex; flex-direction:column; gap:3px; }
.sb-link {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border-radius:var(--r10);
  color:rgba(255,248,231,0.6); font-size:0.88rem; font-weight:500;
  cursor:pointer; transition:all var(--t); user-select:none;
}
.sb-link:hover { background:rgba(255,215,122,0.1); color:var(--gold); }
.sb-link.active { background:rgba(255,215,122,0.18); color:var(--gold); font-weight:700; }
.sb-link-i { font-size:1rem; width:20px; text-align:center; }
.sb-foot {
  padding:16px 22px;
  border-top:1px solid rgba(255,215,122,0.12);
}
.sb-back {
  font-size:0.8rem; color:rgba(255,248,231,0.45);
  cursor:pointer; transition:color var(--t);
  display:flex; align-items:center; gap:6px;
}
.sb-back:hover { color:var(--gold); }

.dash-body {
  flex:1; margin-left:230px; padding:30px 32px;
  background:#F5EDD8; min-height:100vh;
}
