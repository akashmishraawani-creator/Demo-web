<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FollowFlow \u2014 WhatsApp Automation SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8E7;
    --gold-light: #FFD77A;
    --gold-rich: #E6A520;
    --gold-deep: #C8891A;
    --brown-dark: #7A4A00;
    --brown-mid: #5C3700;
    --brown-light: #9B6A1A;
    --white: #FFFFFF;
    --text-dark: #2C1A00;
    --text-mid: #5A3A0A;
    --text-light: #8B6A3A;
    --shadow-soft: 0 4px 24px rgba(122,74,0,0.10);
    --shadow-gold: 0 4px 32px rgba(230,165,32,0.18);
    --shadow-card: 0 8px 40px rgba(122,74,0,0.08);
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --transition: 0.3s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* \u2500\u2500 SCROLLBAR \u2500\u2500 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 3px; }

  /* \u2500\u2500 UTILITY \u2500\u2500 */
  .container { max-width: 1160px; margin: 0 auto; padding: 0 28px; }
  .gold-text { color: var(--gold-rich); }
  .section-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-rich); margin-bottom: 16px;
  }
  .section-label::before {
    content: ''; width: 20px; height: 2px; background: var(--gold-rich); border-radius: 2px;
  }

  /* \u2500\u2500 NAV \u2500\u2500 */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,248,231,0.90);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(230,165,32,0.15);
    padding: 0 28px;
  }
  .nav-inner {
    max-width: 1160px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; color: var(--brown-dark);
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 34px; height: 34px; background: linear-gradient(135deg,var(--gold-light),var(--gold-rich));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: var(--shadow-gold);
  }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--text-mid);
    text-decoration: none; transition: color var(--transition);
  }
  .nav-links a:hover { color: var(--brown-dark); }
  .nav-cta {
    display: flex; align-items: center; gap: 12px;
  }
  .btn-outline {
    padding: 9px 20px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--gold-rich); background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
    color: var(--brown-dark); cursor: pointer; transition: all var(--transition);
    text-decoration: none; display: inline-block;
  }
  .btn-outline:hover { background: var(--gold-light); color: var(--brown-dark); }
  .btn-gold {
    padding: 9px 22px; border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--gold-light), var(--gold-rich));
    border: none; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600;
    color: var(--brown-dark); cursor: pointer; transition: all var(--transition);
    box-shadow: 0 2px 14px rgba(230,165,32,0.3); text-decoration: none; display: inline-block;
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(230,165,32,0.45); }
  .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .nav-hamburger span { width: 24px; height: 2px; background: var(--brown-dark); border-radius: 2px; transition: all var(--transition); }

  /* \u2500\u2500 HERO \u2500\u2500 */
  #landing { display: block; }
  #dashboard { display: none; }

  .hero {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--cream) 0%, #fff4d4 45%, #ffedb5 100%);
    display: flex; align-items: center;
    padding: 120px 0 80px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(255,215,122,0.35) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -150px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(230,165,32,0.12) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .hero-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,215,122,0.3); border: 1px solid rgba(230,165,32,0.4);
