<!DOCTYPE html>
<html>
<head>
  <title>Auto Follow-up SaaS</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin: 20px auto;
      width: 300px;
    }
    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📲 WhatsApp Auto Follow-up SaaS</h1>

<div class="box">
  <h3>Add Lead</h3>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone Number">
  <button onclick="addLead()">Add Lead</button>
</div>

<div class="box">
  <h3>Follow-up Message</h3>
  <textarea id="msg1">Hi {{name}}, thanks for your inquiry 😊</textarea>
  <textarea id="msg2">Just checking, are you interested?</textarea>
  <textarea id="msg3">Last reminder, offer ending soon!</textarea>
</div>

<div class="box">
  <h3>Leads</h3>
  <ul id="leadList"></ul>
</div>

<script>
function addLead() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let li = document.createElement("li");
  li.innerText = name + " (" + phone + ")";
  document.getElementById("leadList").appendChild(li);

  // Fake automation demo
  setTimeout(() => {
    alert("Message sent to " + name);
  }, 2000);

  setTimeout(() => {
    alert("Follow-up 1 sent to " + name);
  }, 5000);

  setTimeout(() => {
    alert("Follow-up 2 sent to " + name);
  }, 8000);
}
</script>

</body>
</html>
