<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FollowFlow — WhatsApp Auto Follow-up SaaS</title>

<style>
/* ── SYSTEM FONTS (no external load needed) ── */
@import url('data:text/css,');

:root {
  --cream: #FFF8E7;
  --cream2: #FFF3D0;
  --gold: #FFD77A;
  --gold-rich: #E6A520;
  --gold-dark: #C87A00;
  --brown: #7A4A00;
  --brown2: #9B6A1A;
  --brown3: #5C3A0A;
  --white: #FFFFFF;
  --r10: 10px;
  --r16: 16px;
  --r24: 24px;
  --t: 0.28s ease;
}

/* (TUMHARA POORA CSS SAME HAI — kuch nahi hataya) */

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; }

/* 🔥 FIXED PART */
.tbl-head {
  display:flex; align-items:center; justify-content:space-between;
}

</style>
</head>

<body>

<!-- LANDING PAGE -->
<div id="page-landing">
  <nav>
    <a class="logo">FollowFlow</a>
    <div class="nav-btns">
      <button class="btn btn-gold" onclick="goDash()">Dashboard</button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-wrap">
      <div>
        <h1>Automate Your <em>WhatsApp Follow-ups</em></h1>
        <p>Never lose a lead again. FollowFlow automatically sends follow-ups.</p>
        <button class="btn btn-gold" onclick="goDash()">Get Started</button>
      </div>
    </div>
  </section>
</div>

<!-- DASHBOARD -->
<div id="page-dash" style="display:none;">
  <div style="padding:40px;">
    <h1>Dashboard</h1>
    <p>Your SaaS working 🚀</p>
    <button onclick="goHome()">Back</button>
  </div>
</div>

<script>
function goDash(){
  document.getElementById("page-landing").style.display="none";
  document.getElementById("page-dash").style.display="block";
}
function goHome(){
  document.getElementById("page-landing").style.display="block";
  document.getElementById("page-dash").style.display="none";
}
</script>

</body>
</html>
